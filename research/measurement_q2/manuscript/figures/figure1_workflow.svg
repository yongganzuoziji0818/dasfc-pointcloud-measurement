   </g>
   <g id="text_3">
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(203.9634 54.25596)">Normal-displacement</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(205.1994 61.11876)">field and diagnostics</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(298.594014 54.314751)">Coverage interval, applicability</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(306.179209 61.265891)">label, and selective score</text>
   </g>
   <g id="text_5">
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(65.8692 121.13649)">Tuning pairs</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(57.535763 128.836215)">fit structural scale</text>
   </g>
   <g id="text_6">
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(183.732188 121.13649)">Validation pairs</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(182.06775 128.75184)">select shrinkage</text>
   </g>
   <g id="text_7">
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(304.606238 121.222552)">Calibration pairs</text>
    <text style="font-size: 7.2px; font-family: 'Arial', 'DejaVu Sans', sans-serif" transform="translate(297.203175 128.837902)">set pair-max quantile</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 8px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start" x="27.288" y="171.9954" transform="rotate(-0 27.288 171.9954)">Deployment rule and evidence boundary</text>
   </g>
   <g id="text_9">
    <text style="font-size: 7.4px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start" x="31.3056" y="187.90668" transform="rotate(-0 31.3056 187.90668)">Protocol metadata maps a scan pair to a predeclared calibrated group. If no mapping exists,</text>
   </g>
   <g id="text_10">
    <text style="font-size: 7.4px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start" x="31.3056" y="199.27188" transform="rotate(-0 31.3056 199.27188)">the output uses the pooled homoscedastic fallback and is labelled empirical / outside guarantee.</text>
   </g>
   <g id="text_11">
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #d55e00" x="31.3056" y="206.091" transform="rotate(-0 31.3056 206.091)">Public scans test surface consistency and diagnostic transfer; they do not provide double-epoch truth.</text>
   </g>
   <g id="text_12">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', sans-serif; text-anchor: start; fill: #666666" x="13.2264" y="229.95792" transform="rotate(-0 13.2264 229.95792)">Conceptual workflow; boxes are not quantitative data.</text>
   </g>
